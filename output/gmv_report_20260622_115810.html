                    document.querySelectorAll('.dimension-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.dimension-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`content-${dim}`).classList.add('active');
                    currentDimension = dim;
                    if (dimensionCharts[dim]) {
                        dimensionCharts[dim].resize();
                    }
                });
                tabsContainer.appendChild(tab);

                const content = document.createElement('div');
                content.id = `content-${dim}`;
                content.className = 'dimension-content' + (index === 0 ? ' active' : '');
                content.innerHTML = `
                    <div id="chart-${dim}" class="chart-container"></div>
                    <table class="contribution-table">
                        <thead>
                            <tr>
                                <th>${dim}</th>
                                <th>GMV</th>
                                <th>贡献占比</th>
                                <th>环比</th>
                                <th>同比</th>
                            </tr>
                        </thead>
                        <tbody id="table-${dim}"></tbody>
                    </table>
                `;
                contentsContainer.appendChild(content);
            });

            if (dimensions.length > 0) {
                currentDimension = dimensions[0];
            }
        }

        function renderTrendChart() {
            if (!trendChart) {
                trendChart = echarts.init(document.getElementById('trendChart'));
                window.addEventListener('resize', () => trendChart.resize());
            }
            trendChart.setOption(reportData.trend_chart || {}, true);
        }

        function renderWaterfallChart() {
            if (!waterfallChart) {
                waterfallChart = echarts.init(document.getElementById('waterfallChart'));
                window.addEventListener('resize', () => waterfallChart.resize());
            }
            waterfallChart.setOption(reportData.waterfall_chart || {}, true);
        }

        function renderHeatmap() {
            if (reportData.heatmap) {
                document.getElementById('heatmapSection').style.display = 'block';
                if (!heatmapChart) {
                    heatmapChart = echarts.init(document.getElementById('heatmapChart'));
                    window.addEventListener('resize', () => heatmapChart.resize());
                }
                heatmapChart.setOption(reportData.heatmap || {}, true);
            }
        }

        function renderDimensionCharts() {
            Object.entries(reportData.dimensions || {}).forEach(([dim, data]) => {
                const chartEl = document.getElementById(`chart-${dim}`);
                if (chartEl && data.bar_chart) {
                    if (!dimensionCharts[dim]) {
                        dimensionCharts[dim] = echarts.init(chartEl);
                        window.addEventListener('resize', () => {
                            if (dimensionCharts[dim]) dimensionCharts[dim].resize();
                        });
                    }
                    dimensionCharts[dim].setOption(data.bar_chart, true);
                }

                const tableBody = document.getElementById(`table-${dim}`);
                if (tableBody && data.contributions) {
                    tableBody.innerHTML = data.contributions.map((c, idx) => {
                        const momClass = c.mom_pct !== null ? (c.mom_pct >= 0 ? 'up' : 'down') : '';
                        const yoyClass = c.yoy_pct !== null ? (c.yoy_pct >= 0 ? 'up' : 'down') : '';
                        const anomalyBadge = c.is_anomaly
                            ? `<span style="background:${c.anomaly_direction === 'up' ? '#ff4d4f' : '#ff4d4f'};color:white;padding:2px 6px;border-radius:4px;font-size:11px;">异常</span>`
                            : '';
                        return `
                            <tr class="drillable" data-dim="${dim}" data-value="${c.value}">
                                <td>${c.value} ${anomalyBadge}</td>
                                <td>${formatCurrency(c.metric_value)}</td>
                                <td>
                                    <div style="display:flex;align-items:center;gap:8px;">
                                        <div class="progress-bar" style="flex:1;">
                                            <div class="progress-fill" style="width:${Math.min(c.contribution_pct, 100)}%"></div>
                                        </div>
                                        <span>${c.contribution_pct.toFixed(1)}%</span>
                                    </div>
                                </td>
                                <td class="${momClass}">${formatPercent(c.mom_pct)}</td>
                                <td class="${yoyClass}">${formatPercent(c.yoy_pct)}</td>
                            </tr>
                        `;
                    }).join('');

                    tableBody.querySelectorAll('.drillable').forEach(row => {
                        row.addEventListener('click', () => {
                            const dim = row.dataset.dim;
                            const value = row.dataset.value;
                            drilldown(dim, value);
                        });
                    });
                }
            });
        }

        function renderAnomalies() {
            const list = document.getElementById('anomalyList');
            const anomalies = reportData.drilldown?.anomalies || [];

            if (anomalies.length === 0) {
                list.innerHTML = '<li style="padding:20px;text-align:center;color:#999;">暂无异常维度</li>';
                return;
            }

            list.innerHTML = anomalies.map(a => `
                <li class="anomaly-item ${a.direction}">
                    <div class="info">
                        <div class="dim">${a.dimension}: ${a.value}</div>
                        <div class="val">GMV: ${formatCurrency(a.metric_value)} | 贡献: ${a.contribution_pct}%</div>
                    </div>
                    <div class="pct">${formatPercent(a.mom_pct)}</div>
                </li>
            `).join('');
        }

        function drilldown(dimension, value) {
            drilldownStack.push({ dimension, value });
            updateBreadcrumb();
            console.log(`Drilling down to ${dimension} = ${value}`);
        }

        function updateBreadcrumb() {
            const breadcrumb = document.getElementById('breadcrumb');
            if (drilldownStack.length === 0) {
                breadcrumb.innerHTML = '';
                return;
            }

            let html = '<span onclick="drilldownUp()">总览</span>';
            drilldownStack.forEach((item, idx) => {
                html += ' / ';
                if (idx === drilldownStack.length - 1) {
                    html += `<span class="current">${item.dimension}: ${item.value}</span>`;
                } else {
                    html += `<span onclick="drilldownToLevel(${idx})">${item.dimension}: ${item.value}</span>`;
                }
            });
            breadcrumb.innerHTML = html;
        }

        function drilldownUp() {
            if (drilldownStack.length > 0) {
                drilldownStack.pop();
                updateBreadcrumb();
            }
        }

        function drilldownToLevel(level) {
            drilldownStack = drilldownStack.slice(0, level + 1);
            updateBreadcrumb();
        }

        function renderAll() {
            renderTrendChart();
            renderWaterfallChart();
            renderHeatmap();
            renderDimensionCharts();
            renderAnomalies();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initFilters();
            initDimensionTabs();
            renderAll();
        });
    </script>
</body>
</html>
